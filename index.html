<script>
// ---- Map init ----
const map = L.map('map').setView([45.50, -73.55], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

// Marker icons
function makeIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="
      width:14px; height:14px; border-radius:50%; background:${color};
      border:2.5px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,0.5);
    "></div>`,
    iconSize: [14, 14],
    iconAnchor: [7, 7],
    popupAnchor: [0, -9],
  });
}
const iconLease = makeIcon('#ddc96a');
const iconSale = makeIcon('#243522');
const iconNew = makeIcon('#e63946');

function hasNotes(mls) {
  const n = notesData[mls];
  return n && Object.keys(n).length > 0;
}

function isNewUnreviewed(l) {
  if (!l || !l.first_seen) return false;
  const ageDays = (Date.now() - new Date(l.first_seen).getTime()) / 86400000;
  if (ageDays > 7) return false;
  const mls = l.mls_number;
  if (favMls.has(mls)) return false;
  if (hasNotes(mls)) return false;
  if (hiddenMls.has(mls)) return false;
  return true;
}

function expectedIcon(l) {
  if (isNewUnreviewed(l)) return iconNew;
  return l.transaction_type === 'sale' ? iconSale : iconLease;
}

function refreshMarkerIcons() {
  markers.forEach(m => {
    const listing = allListings.find(l => l.mls_number === m._listingMls);
    if (!listing) return;
    const want = expectedIcon(listing);
    if (m.options.icon !== want) m.setIcon(want);
  });
}

// Clinic markers (separate layer)
const clinicLayerPA = L.layerGroup().addTo(map);
const clinicLayerComp = L.layerGroup().addTo(map);

function clinicColor(n) { if (n >= 6) return '#ddc96a'; if (n >= 2) return '#6e6724'; return '#9ba491'; }
function clinicRadius(n) { if (n >= 6) return 12; if (n >= 2) return 9; return 7; }

let allListings = [];
let markers = [];
let firstRender = true;

// --- Hidden listings (localStorage) ---
const LS_KEY = 'centris_hidden_mls';
let hiddenMls = new Set(JSON.parse(localStorage.getItem(LS_KEY) || '[]'));
let showHidden = false;

function hideListing(mls, evt) {
  if (evt) evt.stopPropagation();
  hiddenMls.add(mls);
  localStorage.setItem(LS_KEY, JSON.stringify([...hiddenMls]));
  updateHiddenBtn();
  applyFilters();
}

function restoreListing(mls, evt) {
  if (evt) evt.stopPropagation();
  hiddenMls.delete(mls);
  localStorage.setItem(LS_KEY, JSON.stringify([...hiddenMls]));
  updateHiddenBtn();
  applyFilters();
}

function toggleShowHidden() {
  showHidden = !showHidden;
  updateHiddenBtn();
  applyFilters();
}

function updateHiddenBtn() {
  const btn = document.getElementById('btnHidden');
  const n = hiddenMls.size;
  if (n === 0) {
    btn.style.display = 'none';
    showHidden = false;
  } else {
    btn.style.display = '';
    btn.textContent = showHidden ? `Masquer ${n} retir\u00E9(s)` : `Voir ${n} retir\u00E9(s)`;
    btn.style.background = showHidden ? '#fee' : '';
    btn.style.color = showHidden ? '#c00' : '';
  }
}

// --- Firebase init ---
firebase.initializeApp({
  apiKey: "AIzaSyAudP_DW5xTa7AsLfdNzDitWZOYhT05L4s",
  authDomain: "physioactif-centris.firebaseapp.com",
  databaseURL: "https://physioactif-centris-default-rtdb.firebaseio.com",
  projectId: "physioactif-centris",
  appId: "1:369752266285:web:4d8df7bf926d52ecbe4aa4"
});
const db = firebase.database();
const favRef = db.ref('favorites');

// --- Anonymous auth (required by DB security rules: auth != null) ---
// Silent: no login UI for users. Realtime listeners attach once the
// anonymous session is ready so reads aren't rejected before sign-in completes.
let _rtListenersAttached = false;
function attachRealtimeListeners() {
  if (_rtListenersAttached) return;
  _rtListenersAttached = true;
  attachFavListener();
  attachNotesListener();
}
firebase.auth().onAuthStateChanged(function(user) { if (user) attachRealtimeListeners(); });
firebase.auth().signInAnonymously().catch(function(e) { console.error('Firebase anonymous auth failed:', e); });

// --- User identity (simple, localStorage) ---
const USER_KEY = 'centris_user_name';
let userName = localStorage.getItem(USER_KEY);
if (!userName) {
  userName = prompt('Ton pr\u00E9nom (pour identifier tes favoris) :') || 'Anonyme';
  localStorage.setItem(USER_KEY, userName);
}

// --- Favorites (Firebase realtime sync) ---
let favData = {};  // { mls: { user: "name", ts: timestamp } }
let favMls = new Set();

function attachFavListener() {
favRef.on('value', snap => {
  favData = snap.val() || {};
  favMls = new Set(Object.keys(favData));
  renderFavSidebar();
  refreshMarkerIcons();
  // Refresh any open popup
  markers.forEach(m => {
    if (m.isPopupOpen()) {
      const listing = allListings.find(l => l.mls_number === m._listingMls);
      if (listing) m.setPopupContent(popupHtml(listing));
    }
  });
});
}

// --- Notes (Firebase realtime sync) ---
const notesRef = db.ref('notes');
let notesData = {};  // { mls: [{ user, text, ts }, ...] }

function attachNotesListener() {
notesRef.on('value', snap => {
  notesData = snap.val() || {};
  refreshMarkerIcons();
  // Refresh any open popup
  markers.forEach(m => {
    if (m.isPopupOpen()) {
      const listing = allListings.find(l => l.mls_number === m._listingMls);
      if (listing) m.setPopupContent(popupHtml(listing));
    }
  });
  renderFavSidebar();
});
}

function addNote(mls) {
  const input = document.getElementById('note-input-' + mls);
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  notesRef.child(mls).push({ user: userName, text: text, ts: Date.now() });
  input.value = '';
}

function addNoteSb(mls) {
  const input = document.getElementById('sb-note-' + mls);
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  notesRef.child(mls).push({ user: userName, text: text, ts: Date.now() });
  input.value = '';
}

function deleteNote(mls, noteKey) {
  notesRef.child(mls).child(noteKey).remove();
}

function toggleFav(mls) {
  if (favMls.has(mls)) {
    favRef.child(mls).remove();
  } else {
    favRef.child(mls).set({ user: userName, ts: Date.now() });
  }
}

function renderFavSidebar() {
  const sb = document.getElementById('sidebar');
  const favList = document.getElementById('favList');
  const favListings = allListings.filter(l => favMls.has(l.mls_number));
  document.getElementById('favCount').textContent = favListings.length;

  if (favListings.length === 0) {
    sb.classList.remove('visible');
    favList.innerHTML = '';
    return;
  }

  sb.classList.add('visible');
  favList.innerHTML = favListings.map(l => {
    const price = l.price_display || (l.price_value ? `${Number(l.price_value).toLocaleString('fr-CA')} $` : '');
    const sqft = l.sqft ? `${l.sqft.toLocaleString('fr-CA')} pi\u00B2` : '';
    const txClass = l.transaction_type === 'lease' ? 'tx-lease' : 'tx-sale';
    const txLabel = l.transaction_type === 'lease' ? 'Loc.' : 'Vente';
    let priceSqft = '';
    if (l.sqft && l.price_value) {
      const pv = parseFloat(l.price_value);
      if (l.transaction_type === 'lease') priceSqft = `${pv.toFixed(2)} $/pi\u00B2`;
      else if (pv > 100) priceSqft = `${(pv / l.sqft).toFixed(0)} $/pi\u00B2`;
    }
    return `
      <div class="fav-card" onclick="focusFav('${l.mls_number}')">
        <div style="display:flex;justify-content:space-between;align-items:start;">
          <div class="fav-addr">${l.address || '?'}</div>
          <button class="btn-unstar" onclick="event.stopPropagation();toggleFav('${l.mls_number}')" title="Retirer des favoris">&#9733;</button>
        </div>
        <div class="fav-meta">
          <span class="fav-tx ${txClass}">${txLabel}</span>
          ${price ? `<span class="fav-price">${price}</span>` : ''}
          ${sqft ? `<span class="fav-sqft">${sqft}</span>` : ''}
          ${priceSqft ? `<span style="color:#6e6724;">${priceSqft}</span>` : ''}
          ${isNewUnreviewed(l)
            ? `<span style="background:#e63946;color:#fff;padding:1px 6px;border-radius:4px;font-size:11px;font-weight:600;">NOUVEAU</span>`
            : ''}
        </div>
        ${l.broker ? `<div style="font-size:11px;color:#999;margin-top:1px;">${l.broker}</div>` : ''}
        ${favData[l.mls_number] ? `<div style="font-size:10px;color:#9ba491;margin-top:2px;">Ajout\u00E9 par ${favData[l.mls_number].user || '?'}</div>` : ''}
        <div onclick="event.stopPropagation()" style="margin-top:4px;border-top:1px solid #eee;padding-top:4px;">
          ${(() => {
            const n = notesData[l.mls_number] || {};
            const entries = Object.entries(n).sort((a,b) => (a[1].ts||0) - (b[1].ts||0));
            let h = '';
            entries.forEach(([key, note]) => {
              const d = note.ts ? new Date(note.ts).toLocaleDateString('fr-CA') : '';
              h += `<div style="font-size:10px;color:#555;margin-bottom:2px;display:flex;justify-content:space-between;align-items:start;">
                <span><strong style="color:#6e6724;">${note.user}</strong> <span style="color:#bbb;">${d}</span> ${note.text}</span>
                ${note.user === userName ? `<button onclick="deleteNote('${l.mls_number}','${key}')" style="border:none;background:none;color:#c00;cursor:pointer;font-size:9px;padding:0 2px;flex-shrink:0;" title="Supprimer">&#10005;</button>` : ''}
              </div>`;
            });
            return h;
          })()}
          <div style="display:flex;gap:4px;margin-top:3px;">
            <input id="sb-note-${l.mls_number}" type="text" placeholder="Note..." style="flex:1;padding:2px 6px;border:1px solid #ddd;border-radius:4px;font-size:11px;min-width:0;" onkeydown="if(event.key==='Enter')addNoteSb('${l.mls_number}')" />
            <button onclick="addNoteSb('${l.mls_number}')" style="padding:2px 6px;border:1px solid #ddc96a;border-radius:4px;background:#ddc96a;color:#243522;cursor:pointer;font-size:10px;font-weight:600;flex-shrink:0;">OK</button>
          </div>
        </div>
      </div>
    `;
  }).join('');

  // Invalidate map size since sidebar width changed
  setTimeout(() => map.invalidateSize(), 50);
}

function focusFav(mls) {
  const marker = markers.find(m => m._listingMls === mls);
  if (marker) {
    map.setView(marker.getLatLng(), 16, { animate: true });
    marker.openPopup();
  }
}

// Deep-link: ?mls=<NoMls> opens that listing's fiche (used by the email alert).
// Always lands on the fiche: un-hides it and clears filters if it was hidden/filtered.
function openFromUrl() {
  const target = new URLSearchParams(location.search).get('mls');
  if (!target) return;
  if (hiddenMls.has(target)) {
    hiddenMls.delete(target);
    localStorage.setItem(LS_KEY, JSON.stringify([...hiddenMls]));
    updateHiddenBtn();
    applyFilters();
  }
  // Defer so the initial fitBounds/layout has settled; animate:false makes the
  // jump deterministic (an animated setView gets clobbered by fitBounds at load).
  setTimeout(() => {
    let marker = markers.find(m => m._listingMls === target);
    if (!marker) {          // filtered out -> reset filters and retry
      resetFilters();
      marker = markers.find(m => m._listingMls === target);
    }
    if (marker) {
      map.setView(marker.getLatLng(), 16, { animate: false });
      marker.openPopup();
    }
  }, 300);
}

// ---- Init from embedded data ----
allListings = DATA.listings || [];
document.getElementById('stats').textContent =
  `${allListings.length} annonces (Centris ${DATA.search_date ? DATA.search_date.substring(0, 10) : ''})`;

const cats = [...new Set(allListings.map(l => l.category).filter(Boolean))].sort();
const cities = [...new Set(allListings.map(l => l.area_label || l.city || '').filter(Boolean))].sort();
populateSelect('filterCat', cats);
populateSelect('filterCity', cities);
updateHiddenBtn();
// Note: renderFavSidebar() is called by Firebase listener on 'value'

// ---- Clinic overlay (filtered to listing bounds) ----
const listingLats = allListings.filter(l => l.latitude).map(l => l.latitude);
const listingLngs = allListings.filter(l => l.longitude).map(l => l.longitude);
const clinicBounds = {
  minLat: Math.min(...listingLats) - 0.02,
  maxLat: Math.max(...listingLats) + 0.02,
  minLng: Math.min(...listingLngs) - 0.02,
  maxLng: Math.max(...listingLngs) + 0.02,
};
// Exclude Montréal island clinics (lon <= -73.50 separates from Rive-Sud/Boucherville)
function isMontrealIsland(lat, lon) {
  return lat >= 45.42 && lat <= 45.58 && lon <= -73.50;
}

let clinicCount = 0;
CLINICS.forEach(c => {
  if (!c.lat || !c.lon) return;
  if (c.lat < clinicBounds.minLat || c.lat > clinicBounds.maxLat ||
      c.lon < clinicBounds.minLng || c.lon > clinicBounds.maxLng) return;
  if (isMontrealIsland(c.lat, c.lon) && !c.is_physioactif) return;
  clinicCount++;
  let marker;
  const specs = c.specialties ? `<div style="font-size:11px;color:#666;margin-top:2px;">${c.specialties}</div>` : '';
  const web = c.website ? `<a href="${c.website}" target="_blank" style="font-size:11px;">Site web</a>` : '';
  const popup = `
    <div style="font-weight:600;font-size:13px;">${c.is_physioactif ? '&#9733; ' : ''}${c.name}</div>
    <div style="font-size:12px;color:#555;">${c.address || ''}</div>
    <div style="font-size:12px;margin-top:2px;">
      <strong>${c.num_physios}</strong> physio${c.num_physios > 1 ? 's' : ''}
      ${c.num_trps ? ` &middot; ${c.num_trps} TRP` : ''}
    </div>
    ${specs}${web}
  `;
  if (c.is_physioactif) {
    const icon = L.divIcon({
      className: '',
      html: `<div style="
        background:#ddc96a; border:3px solid #243522;
        width:26px; height:26px; border-radius:4px;
        transform:rotate(45deg); box-shadow:0 2px 6px rgba(0,0,0,0.3);
      "></div>`,
      iconSize: [26, 26], iconAnchor: [13, 13], popupAnchor: [0, -13],
    });
    marker = L.marker([c.lat, c.lon], { icon, zIndexOffset: 1000 });
    clinicLayerPA.addLayer(marker);
  } else {
    marker = L.circleMarker([c.lat, c.lon], {
      radius: clinicRadius(c.num_physios),
      fillColor: clinicColor(c.num_physios),
      color: '#fff', weight: 1, opacity: 0.9, fillOpacity: 0.8,
    });
    clinicLayerComp.addLayer(marker);
  }
  marker.bindPopup(popup, { maxWidth: 280 });
});
document.getElementById('clinicCount').textContent = `(${clinicCount})`;
document.getElementById('toggleClinics').addEventListener('change', function() {
  if (this.checked) {
    map.addLayer(clinicLayerPA);
    map.addLayer(clinicLayerComp);
  } else {
    map.removeLayer(clinicLayerPA);
    map.removeLayer(clinicLayerComp);
  }
});

// ---- Opportunity zones overlay ----
const zoneColors = ['#1565C0','#1565C0','#2196F3','#2196F3','#42A5F5','#42A5F5','#64B5F6','#64B5F6','#90CAF9','#90CAF9'];
const zoneLayer = L.layerGroup().addTo(map);

function showZonePanel(zoneIdx) {
  const z = ZONES[zoneIdx];
  if (!z) return;
  const panel = document.getElementById('zonePanel');
  const detail = document.getElementById('zoneDetail');
  document.getElementById('zonePanelTitle').textContent = z.intersection_name;

  const ss = z.sub_scores || {};
  const nc = z.nearby_clinics || [];
  const narr = z.narrative || {};

  let html = `<span class="zd-score">${Math.round(z.score_mean)}/100</span>`;
  html += `<div style="font-size:11px;color:#9ba491;margin-bottom:8px;">${z.intersection_desc}</div>`;

  html += `<div class="zd-stats">
    <div class="zd-stat"><span class="zd-stat-label">Pop. 3km</span><span class="zd-stat-value">${z.pop_3km.toLocaleString('fr-CA')}</span></div>
    <div class="zd-stat"><span class="zd-stat-label">Concurrent</span><span class="zd-stat-value">${z.nearest_competitor_dist} km</span></div>
  </div>`;

  html += `<div class="zd-subscores">
    <span class="zd-ss" title="Vide concurrentiel">&#x1f6c8; ${Math.round(ss.competitive || 0)}</span>
    <span class="zd-ss" title="Densit\u00E9 pop.">&#x1f3d8; ${Math.round(ss.density || 0)}</span>
    <span class="zd-ss" title="Accessibilit\u00E9">&#x1f6e3; ${Math.round(ss.accessibility || 0)}</span>
    <span class="zd-ss" title="Isolation autoroute">&#x1f6a7; ${Math.round(ss.isolation || 0)}</span>
    <span class="zd-ss" title="Qualit\u00E9 d\u00E9mo.">&#x1f4b0; ${Math.round(ss.demographic || 0)}</span>
  </div>`;

  if (narr.strengths) {
    html += `<div class="zd-section"><strong>Pourquoi cet emplacement:</strong><ul>${narr.strengths.map(s => `<li>${s}</li>`).join('')}</ul></div>`;
  }
  if (narr.consumer_perspective) {
    html += `<div class="zd-consumer">${narr.consumer_perspective}</div>`;
  }
  if (narr.risks) {
    html += `<div class="zd-section"><strong>Risques:</strong><ul>${narr.risks.map(r => `<li class="zd-risk">${r}</li>`).join('')}</ul></div>`;
  }
  if (nc.length) {
    html += `<div class="zd-section"><strong>Concurrents proches:</strong>`;
    nc.slice(0, 5).forEach(c => {
      const chain = c.is_chain ? ` <span class="zd-chain">Chaine</span>` : '';
      html += `<div class="zd-clinic">${c.name}${chain} - ${c.distance_km} km (${c.physios} physios)</div>`;
    });
    html += `</div>`;
  }

  detail.innerHTML = html;
  panel.classList.add('visible');
  setTimeout(() => map.invalidateSize(), 50);
}

function closeZonePanel() {
  if (activeCircle) { map.removeLayer(activeCircle); activeCircle = null; }
  document.getElementById('zonePanel').classList.remove('visible');
  setTimeout(() => map.invalidateSize(), 50);
}

let activeCircle = null;
ZONES.forEach((z, i) => {
  const color = zoneColors[i] || '#90CAF9';
  // Zone center label
  if (z.center) {
    const label = L.marker(z.center, {
      icon: L.divIcon({
        className: '',
        html: `<div style="background:${color};color:#fff;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;white-space:nowrap;opacity:0.85;cursor:pointer;">${z.intersection_name}</div>`,
        iconSize: [0, 0],
      }),
    });
    label.on('click', () => showZonePanel(i));
    zoneLayer.addLayer(label);
  }
  // Corridors (polylines)
  if (z.corridors) {
    z.corridors.forEach(cor => {
      if (!cor.points || cor.points.length < 2) return;
      const line = L.polyline(cor.points, {
        color: color, weight: 6, opacity: 0.85,
        lineCap: 'round', lineJoin: 'round',
        bubblingMouseEvents: false,
      });
      line.on('click', () => {
        if (activeCircle) { map.removeLayer(activeCircle); activeCircle = null; }
        const mid = cor.points[Math.floor(cor.points.length / 2)];
        activeCircle = L.circle(mid, {
          radius: 3000,
          color: color, weight: 2, dashArray: '6,4',
          fillColor: color, fillOpacity: 0.08,
        }).addTo(map);
        showZonePanel(i);
        map.flyToBounds(activeCircle.getBounds(), { padding: [50, 50], maxZoom: 13, duration: 0.8 });
      });
      line.bindTooltip(`${cor.artery}: ${cor.from_street} \u2192 ${cor.to_street}`, { sticky: true });
      zoneLayer.addLayer(line);
    });
  }
});

document.getElementById('toggleZones').addEventListener('change', function() {
  if (this.checked) map.addLayer(zoneLayer);
  else { map.removeLayer(zoneLayer); closeZonePanel(); }
});

applyFilters();

function populateSelect(id, values) {
  const sel = document.getElementById(id);
  const current = sel.value;
  sel.innerHTML = '<option value="all">Toutes</option>';
  values.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = v;
    sel.appendChild(opt);
  });
  sel.value = current || 'all';
}

// ---- Filters ----
document.getElementById('filterTx').addEventListener('change', applyFilters);
document.getElementById('filterCat').addEventListener('change', applyFilters);
document.getElementById('filterCity').addEventListener('change', applyFilters);
document.getElementById('sqftMin').addEventListener('input', debounce(applyFilters, 400));
document.getElementById('sqftMax').addEventListener('input', debounce(applyFilters, 400));
document.getElementById('priceMin').addEventListener('input', debounce(applyFilters, 400));
document.getElementById('priceMax').addEventListener('input', debounce(applyFilters, 400));
document.getElementById('filterNew').addEventListener('change', applyFilters);

function debounce(fn, ms) {
  let t; return () => { clearTimeout(t); t = setTimeout(fn, ms); };
}

function resetFilters() {
  document.getElementById('filterTx').value = 'all';
  document.getElementById('filterCat').value = 'all';
  document.getElementById('filterCity').value = 'all';
  document.getElementById('sqftMin').value = '';
  document.getElementById('sqftMax').value = '';
  document.getElementById('priceMin').value = '';
  document.getElementById('priceMax').value = '';
  document.getElementById('filterNew').checked = false;
  applyFilters();
}

function applyFilters() {
  const tx = document.getElementById('filterTx').value;
  const cat = document.getElementById('filterCat').value;
  const city = document.getElementById('filterCity').value;
  const sqftMin = parseInt(document.getElementById('sqftMin').value) || null;
  const sqftMax = parseInt(document.getElementById('sqftMax').value) || null;
  const priceMin = parseFloat(document.getElementById('priceMin').value) || null;
  const priceMax = parseFloat(document.getElementById('priceMax').value) || null;
  const onlyNew = document.getElementById('filterNew').checked;

  const filtered = allListings.filter(l => {
    if (!showHidden && hiddenMls.has(l.mls_number)) return false;
    if (tx !== 'all' && l.transaction_type !== tx) return false;
    if (cat !== 'all' && l.category !== cat) return false;
    if (city !== 'all') {
      const lCity = l.area_label || l.city || '';
      if (lCity !== city) return false;
    }
    if (sqftMin && l.sqft && l.sqft < sqftMin) return false;
    if (sqftMax && l.sqft && l.sqft > sqftMax) return false;
    const pv = parseFloat(l.price_value);
    if (priceMin && pv && pv < priceMin) return false;
    if (priceMax && pv && pv > priceMax) return false;
    if (onlyNew) {
      const cutoff = Date.now() - 7 * 86400000;
      if (!l.first_seen || new Date(l.first_seen).getTime() < cutoff) return false;
    }
    return true;
  });

  document.getElementById('stats').textContent =
    `${filtered.length}/${allListings.length} annonces (Centris ${DATA.search_date ? DATA.search_date.substring(0, 10) : ''})`;
  renderMap(filtered);
}

// ---- Map rendering ----
function renderMap(listings) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const bounds = [];
  listings.forEach(l => {
    if (!l.latitude || !l.longitude) return;
    const icon = expectedIcon(l);
    const m = L.marker([l.latitude, l.longitude], { icon })
      .addTo(map)
      .bindPopup(popupHtml(l), { maxWidth: 300 });
    m._listingMls = l.mls_number;
    markers.push(m);
    bounds.push([l.latitude, l.longitude]);
  });

  if (bounds.length && firstRender) {
    map.fitBounds(bounds, { padding: [30, 30], maxZoom: 15 });
    firstRender = false;
  }
}

function popupHtml(l) {
  const isFav = favMls.has(l.mls_number);
  const price = l.price_display || (l.price_value ? `${Number(l.price_value).toLocaleString('fr-CA')} $` : '');
  const sqft = l.sqft ? l.sqft.toLocaleString('fr-CA') : '';
  const txLabel = l.transaction_type === 'lease' ? 'Location' : 'Vente';
  const txColor = l.transaction_type === 'lease' ? '#ddc96a' : '#243522';
  const txFg = l.transaction_type === 'lease' ? '#243522' : '#fff';
  const isNew = isNewUnreviewed(l);
  const newBadge = isNew ? `<span style="background:#e63946;color:#fff;padding:1px 6px;border-radius:4px;font-size:11px;font-weight:600;margin-right:4px;">NOUVEAU</span>` : '';
  // Price per sqft
  let priceSqft = '';
  if (l.sqft && l.price_value) {
    const pv = parseFloat(l.price_value);
    if (l.transaction_type === 'lease') {
      priceSqft = `${pv.toFixed(2)} $/pi\u00B2/an`;
    } else if (pv > 100) {
      priceSqft = `${(pv / l.sqft).toFixed(2)} $/pi\u00B2`;
    }
  }
  return `
    <div style="min-width:220px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <span style="font-weight:600;font-size:13px;">${l.category || 'Commercial'}</span>
        <span style="display:flex;align-items:center;">${newBadge}<span style="background:${txColor};color:${txFg};padding:1px 8px;border-radius:4px;font-size:11px;font-weight:500;">${txLabel}</span></span>
      </div>
      <div style="font-size:12px;color:#555;margin-bottom:6px;">${l.address || '?'}</div>
      <table style="font-size:12px;border-collapse:collapse;width:100%;">
        ${price ? `<tr><td style="color:#888;padding:1px 8px 1px 0;">Prix</td><td style="font-weight:600;color:#243522;">${price}</td></tr>` : ''}
        ${sqft ? `<tr><td style="color:#888;padding:1px 8px 1px 0;">Superficie</td><td>${sqft} pi\u00B2</td></tr>` : ''}
        ${priceSqft ? `<tr><td style="color:#888;padding:1px 8px 1px 0;">Prix/pi\u00B2</td><td style="font-weight:600;">${priceSqft}</td></tr>` : ''}
        ${l.broker ? `<tr><td style="color:#888;padding:1px 8px 1px 0;">Courtier</td><td style="font-size:11px;">${l.broker}</td></tr>` : ''}
      </table>
      ${l.description ? `<div style="font-size:11px;color:#666;margin-top:4px;border-top:1px solid #eee;padding-top:4px;">${l.description.substring(0, 150)}${l.description.length > 150 ? '...' : ''}</div>` : ''}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;">
        <a href="${l.listing_url}" target="_blank" style="font-size:12px;color:#2563eb;text-decoration:none;">MLS ${l.mls_number} &rarr; Centris</a>
        <div style="display:flex;gap:4px;">
          <button onclick="toggleFav('${l.mls_number}')" style="padding:2px 10px;font-size:14px;border:1px solid ${isFav ? '#ddc96a' : '#ddd'};border-radius:4px;background:${isFav ? '#ddc96a' : '#fff'};color:${isFav ? '#243522' : '#999'};cursor:pointer;" title="${isFav ? 'Retirer des favoris' : 'Ajouter aux favoris'}">&#9733;</button>
          <button onclick="hideListing('${l.mls_number}');map.closePopup();" style="padding:2px 10px;font-size:11px;border:1px solid #ddd;border-radius:4px;background:#fff;color:#999;cursor:pointer;">Retirer</button>
        </div>
      </div>
      ${(() => {
        const mlsNotes = notesData[l.mls_number] || {};
        const noteEntries = Object.entries(mlsNotes).sort((a, b) => (a[1].ts || 0) - (b[1].ts || 0));
        let html = '<div style="margin-top:6px;border-top:1px solid #eee;padding-top:6px;">';
        html += '<div style="font-size:11px;font-weight:600;color:#243522;margin-bottom:4px;">Notes</div>';
        if (noteEntries.length) {
          noteEntries.forEach(([key, n]) => {
            const date = n.ts ? new Date(n.ts).toLocaleDateString('fr-CA') : '';
            html += `<div style="font-size:11px;color:#555;margin-bottom:3px;display:flex;justify-content:space-between;align-items:start;">
              <span><strong style="color:#6e6724;">${n.user}</strong> <span style="color:#999;">(${date})</span>: ${n.text}</span>
              ${n.user === userName ? `<button onclick="deleteNote('${l.mls_number}','${key}')" style="border:none;background:none;color:#c00;cursor:pointer;font-size:10px;padding:0 2px;" title="Supprimer">&#10005;</button>` : ''}
            </div>`;
          });
        }
        html += `<div style="display:flex;gap:4px;margin-top:4px;">
          <input id="note-input-${l.mls_number}" type="text" placeholder="Ajouter une note..." style="flex:1;padding:3px 6px;border:1px solid #ccc;border-radius:4px;font-size:11px;" onkeydown="if(event.key==='Enter')addNote('${l.mls_number}')" />
          <button onclick="addNote('${l.mls_number}')" style="padding:3px 8px;border:1px solid #ddc96a;border-radius:4px;background:#ddc96a;color:#243522;cursor:pointer;font-size:11px;font-weight:500;">OK</button>
        </div>`;
        html += '</div>';
        return html;
      })()}
    </div>
  `;
}

// Open a specific fiche if the URL carries ?mls=... (email alert deep-link)
openFromUrl();

</script>
</body>
</html>
